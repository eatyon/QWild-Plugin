# QWild 发送分流
# 开启后接管发送协议，缺少映射时自动走原协议。
enable: false

# 未知类型消息使用的协议；留空表示未知类型走原协议。
default: ""

# 目标协议发送失败时尝试另一协议，缺少身份映射不会触发切换。
failover: false

# 接管定时任务、插件主动群聊/私聊等非回复消息。
active_message:
  enable: false

# 以下类型留空表示不接管，直接走原协议。
text: "qqbot"
image: "qqbot"
image_text: "qqbot"
record: ""
video: ""
file: ""
button: "qqbot"
markdown: "qqbot"
node: "onebot"
forward: "onebot"
link: ""

# 命令分流优先级高于消息类型分流。
# match 可选 starts / contains / equals / regex，texts 可填写多个命令，protocol 可选 qqbot / onebot / 留空。
# protocol 留空表示命中后仍走原协议。
command_rules: []
